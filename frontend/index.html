<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jiwon Eom Portfolio</title>
    <meta name="description" content="Jiwon Eom - Game & Web Developer Portfolio">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900&family=Open+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800&family=Quicksand:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >
  </head>
  <body>
    <div id="app"></div>
    <script>
      (function () {
        if ('scrollRestoration' in history) {
          history.scrollRestoration = 'manual';
        }

        function scrollTop() {
          window.scrollTo(0, 0);
          document.documentElement.scrollTop = 0;
          document.body.scrollTop = 0;
        }

        function isReload() {
          var entry = performance.getEntriesByType && performance.getEntriesByType('navigation')[0];
          if (entry && entry.type === 'reload') {
            return true;
          }
          return performance.navigation && performance.navigation.type === 1;
        }

        function forceTopOnReload() {
          if (!isReload()) {
            return;
          }
          scrollTop();
          requestAnimationFrame(scrollTop);
          setTimeout(scrollTop, 0);
          setTimeout(scrollTop, 50);
        }

        forceTopOnReload();

        window.addEventListener('pageshow', function (event) {
          if (event.persisted || isReload()) {
            forceTopOnReload();
          }
        });
      })();
    </script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
